# fly.toml — WPPConnect (WhatsApp multi-session server) sidecar for TravelSuite
# Replaced WAHA Core (single-session) with WPPConnect (unlimited sessions, free).
#
# Deploy:  cd waha && fly deploy
# Logs:    fly logs --app travel-suite-waha
# Status:  fly status --app travel-suite-waha
# Secrets: fly secrets set SECRET_KEY=<value> --app travel-suite-waha

app = "travel-suite-waha"
primary_region = "bom"  # Mumbai — lowest latency for Indian operators

[build]
  # Built from local Dockerfile (waha/Dockerfile) — WPPConnect from GitHub source
  # No pre-built Docker Hub image is available for WPPConnect-server

[env]
  # WPPConnect config — SECRET_KEY set via `fly secrets set`
  PORT              = "21465"   # WPPConnect default port
  START_ALL_SESSION = "false"   # Don't auto-start on boot; orgs connect on-demand
  WEBHOOK_ALLOWED_LIST = ""     # Allow all domains (Vercel URLs vary by deploy)
  MAX_LISTENERS     = "100"     # Max concurrent sessions (one per org)

[http_service]
  internal_port        = 21465   # WPPConnect listens on 21465, not 3000
  force_https          = true
  auto_stop_machines   = false   # Always-on — WhatsApp sessions must not drop
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size  = "shared-cpu-1x"
  memory = "1gb"   # Handles ~20 concurrent org sessions comfortably
  count = 1        # Single machine — sessions stored on local disk, HA would split state
