# fly.toml — WAHA (WhatsApp HTTP API) sidecar for TravelSuite
# Deploy:  cd waha && fly deploy
# Logs:    fly logs --app travel-suite-waha
# Status:  fly status --app travel-suite-waha

app = "travel-suite-waha"
primary_region = "bom"  # Mumbai — lowest latency for Indian operators

[build]
  image = "devlikeapro/waha:latest"

[env]
  # WAHA config — secrets (WHATSAPP_API_KEY, WAHA_WEBHOOK_SECRET) set via `fly secrets set`
  WHATSAPP_HOOK_EVENTS = "session.status,message"
  WAHA_LOG_LEVEL        = "info"
  WAHA_LOG_FORMAT       = "json"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = false   # Always-on — WhatsApp sessions must not drop
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size   = "shared-cpu-1x"
  memory = "1gb"            # Handles ~20 concurrent operators comfortably
